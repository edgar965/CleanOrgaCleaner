name: iOS Upload Only

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build whose IPA-Artifact should be uploaded'
        required: true
        default: '25754225779'

jobs:
  upload-ios:
    runs-on: macos-15
    steps:
    - name: Download IPA Artifact
      uses: actions/download-artifact@v4
      with:
        name: CleanOrga-iOS
        path: ./ipa
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.run_id }}

    - name: Select Xcode 26.3
      run: sudo xcode-select -s /Applications/Xcode_26.3.app

    - name: Upload to App Store Connect
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      run: |
        IPA_PATH=$(find ./ipa -name "*.ipa" -type f | head -1)
        if [ -z "$IPA_PATH" ]; then
          echo "No IPA file found!"
          exit 1
        fi
        echo "Found IPA: $IPA_PATH"

        mkdir -p ~/.appstoreconnect/private_keys
        echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

        echo "Uploading IPA to App Store Connect..."
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "$APP_STORE_CONNECT_KEY_ID" \
          --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1 | tee /tmp/upload_output.txt

        if grep -q "ERROR" /tmp/upload_output.txt; then
          echo "::error::Upload FAILED"
          exit 1
        fi
        echo "Upload successful!"
